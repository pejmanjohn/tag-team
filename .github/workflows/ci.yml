name: CI

on:
  # Only build on pushes to main; PR branches are covered by pull_request, so
  # scoping push to main stops every PR from double-running the suite.
  push:
    branches: [main]
  pull_request:

# Offline by design: the parity suite runs the real Flue app against an
# in-memory fake Slack/provider backend. No secrets, no network beyond the npm
# registry (npm ci). The CI runner's Node is pinned by .nvmrc (>= 22.19), so
# Lane B builds and spawns the Flue app with the runner's own Node — no
# FLUE_NODE_BIN override is needed (that is only for the local default Node 22.14).
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Runs typecheck plus the unit tests and the Lane B parity suite (which
      # builds dist-node/ once and spawns a fresh Flue server per scenario).
      - name: Test (Lane B parity + unit tests)
        run: npm run test:ci

      # Confirm the production node artifact still builds.
      - name: Build (node target)
        run: npm run flue:build

  cf-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Builds the Cloudflare bundle and exercises it under local workerd,
      # including signed Slack events, dedupe, restart persistence, and the
      # Durable Object alarm relay. It uses fake backends and needs no secrets.
      - name: Verify Cloudflare runtime
        run: npm run verify:cf-smoke
